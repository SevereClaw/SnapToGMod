name: Build Windows

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements-dev.txt

      - name: Check Python syntax
        run: python -m compileall -q .

      - name: Build executable
        run: pyinstaller --clean --noconfirm SnapToGMod.spec

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: SnapToGMod-Windows
          path: dist/SnapToGMod.exe
          if-no-files-found: error

      - name: Publish tagged release asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/SnapToGMod.exe
          generate_release_notes: true
