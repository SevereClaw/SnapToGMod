name: Build Windows executable

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Validate Python syntax
        run: python -m py_compile SnapSt.py

      - name: Build executable
        run: pyinstaller --clean --onefile --noconsole --name SnapToGMod SnapSt.py

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: SnapToGMod-Windows
          path: dist/SnapToGMod.exe
          if-no-files-found: error

      - name: Attach executable to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          files: dist/SnapToGMod.exe
          generate_release_notes: true
